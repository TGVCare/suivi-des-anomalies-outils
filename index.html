<style>
:root{
  --bg:#F3F1FA; --card:#FFFFFF; --ink:#211A2E; --mu:#6D6482; --mu2:#938AA6; --line:#E4DEF2;
  --hi:#5B2A8C; --hi-d:#431F66; --hi-bg:#F1E7FA;
  --p1:#D6455A; --p1-bg:#FBE7EA; --p2:#DB8A2E; --p2-bg:#FCEEDD; --p3:#B99A15; --p3-bg:#FBF4D6;
  --ok:#2E9F6A; --ok-bg:#E4F6EC; --grey:#8A93A8; --grey-bg:#EDEFF4;
  --red:#D6455A; --shadow:0 1px 2px rgba(30,15,50,.06),0 6px 18px rgba(30,15,50,.07);
  --spark-up-good:#2E9F6A; --spark-up-bad:#D6455A;
  --hi-solid:#6B3AA0; --hi-solid-d:#54297F; --ok-solid:#289066; --p1-solid:#C93E52; --p2-solid:#C77A28;
  --info:#2454C7; --info-bg:#EAF0FF; --teal:#0E8A8A; --teal-bg:#E1F5F5;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#131019; --card:#1C1826; --ink:#EEE9F7; --mu:#A79DC2; --mu2:#847999; --line:#332B48;
    --hi:#C9A2EF; --hi-d:#DBBBFA; --hi-bg:#2E2545;
    --p1:#F0899A; --p1-bg:#3C2129; --p2:#F0B36C; --p2-bg:#3B2C16; --p3:#E7D278; --p3-bg:#39341A;
    --ok:#7BDBA6; --ok-bg:#183327; --grey:#A79DC2; --grey-bg:#241F33;
    --red:#F0899A; --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.45);
    --info:#8FB4F5; --info-bg:#1F2E4A; --teal:#5FD1D1; --teal-bg:#123434;
  }
}
:root[data-theme="dark"]{
  --bg:#131019; --card:#1C1826; --ink:#EEE9F7; --mu:#A79DC2; --mu2:#847999; --line:#332B48;
  --hi:#C9A2EF; --hi-d:#DBBBFA; --hi-bg:#2E2545;
  --p1:#F0899A; --p1-bg:#3C2129; --p2:#F0B36C; --p2-bg:#3B2C16; --p3:#E7D278; --p3-bg:#39341A;
  --ok:#7BDBA6; --ok-bg:#183327; --grey:#A79DC2; --grey-bg:#241F33;
  --red:#F0899A; --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.45);
  --info:#8FB4F5; --info-bg:#1F2E4A; --teal:#5FD1D1; --teal-bg:#123434;
}
body{transition:background-color .2s,color .2s}
.card,.topbar,.kpi,.tblwrap,.info-panel,.choice{transition:background-color .2s,border-color .2s,box-shadow .2s}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.01em}
p{margin:0}
a{color:inherit}
button{font:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}
.narrow{max-width:760px;margin:0 auto;padding:0 20px}

/* ---- top bar ---- */
.topbar{position:sticky;top:0;z-index:40;background:var(--card);border-bottom:1px solid var(--line)}
.topbar-in{max-width:1180px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px;letter-spacing:-.01em;flex-shrink:0}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--hi);flex-shrink:0}
.brand small{display:block;font-weight:500;color:var(--mu);font-size:11px;margin-top:1px}
.navlinks{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.navlinks button{background:none;border:none;padding:8px 12px;border-radius:8px;font-weight:600;color:var(--mu);font-size:13.5px}
.navlinks button.on{background:var(--hi-bg);color:var(--hi-d)}
.navlinks button:hover{background:var(--grey-bg)}
.mobile-nav-toggle{display:none;background:none;border:1px solid var(--line);border-radius:9px;width:36px;height:36px;align-items:center;justify-content:center;font-size:16px;color:var(--mu);flex-shrink:0;cursor:pointer}
.mobile-nav-dropdown{display:none}
@media(max-width:760px){
  .navlinks{display:none}
  .mobile-nav-toggle{display:flex}
  .mobile-nav-dropdown{display:flex;flex-direction:column;gap:2px;padding:8px 20px 14px;border-top:1px solid var(--line)}
  .mobile-nav-dropdown button{width:100%;text-align:left;padding:10px 12px;background:none;border:none;border-radius:8px;font-weight:600;color:var(--mu);font-size:14px}
  .mobile-nav-dropdown button.on{background:var(--hi-bg);color:var(--hi-d)}
  .brand small{display:none}
  .topbar-in{padding:10px 12px;gap:8px}
  .applogo{height:26px}
  .brand{gap:5px}
  .brand>div{font-size:15px;line-height:1.2}
}

/* ---- buttons ---- */
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:9px;padding:10px 16px;border:1px solid var(--line);background:var(--card);font-weight:600;font-size:13.5px;color:var(--ink);white-space:nowrap}
.btn:hover{border-color:var(--hi)}
.btn.bp{background:var(--hi-solid);border-color:var(--hi-solid);color:#fff}
.btn.bp:hover{background:var(--hi-solid-d)}
.btn.bd{background:none;border:none;color:var(--mu);padding:8px 6px}
.btn.br{border-color:var(--p1);color:var(--p1)}
.btn.bsm{padding:6px 11px;font-size:12.5px;border-radius:7px}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.btnrow{display:flex;gap:8px;flex-wrap:wrap}

/* ---- cards / layout ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.pad{padding:22px}
.section{padding:36px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}.grid5{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.grid3{grid-template-columns:1fr}.grid5{grid-template-columns:1fr 1fr}}

/* ---- hero ---- */
.hero{padding:54px 0 40px;text-align:center}
.hero h1{font-size:32px;line-height:1.15}
.hero p.lead{color:var(--mu);font-size:15.5px;max-width:640px;margin:14px auto 0}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--hi-bg);color:var(--hi-d);padding:5px 12px;border-radius:99px;font-size:12px;font-weight:700;letter-spacing:.02em;text-transform:uppercase}

.choice{padding:6px;border-radius:16px;text-align:left;transition:transform .15s,box-shadow .15s;text-decoration:none;display:block;cursor:pointer;border:1px solid var(--line);background:var(--card)}
.choice:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(20,30,60,.10)}
.choice .ic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
.choice h3{font-size:18px;margin-bottom:6px}
.choice p{color:var(--mu);font-size:13.5px}
.choice .go{margin-top:14px;font-size:13px;font-weight:700;color:var(--hi)}

.info-panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px}
.info-panel h4{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--mu);margin-bottom:10px}
.info-list{margin:0;padding-left:18px;color:var(--ink);font-size:13.5px;line-height:1.7}
.sites-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.site-chip{background:var(--grey-bg);color:var(--ink);padding:5px 11px;border-radius:99px;font-size:12.5px;font-weight:600}

/* ---- forms ---- */
label{display:block;font-size:12.5px;font-weight:700;color:var(--mu);margin:0 0 6px;text-transform:uppercase;letter-spacing:.02em}
.field{margin-bottom:16px}
.inp,select.inp,textarea.inp{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:var(--bg);color:var(--ink);font-size:14px}
.inp:focus,select.inp:focus,textarea.inp:focus{outline:2px solid var(--hi-bg);border-color:var(--hi)}
textarea.inp{resize:vertical;min-height:80px}
.req::after{content:" *";color:var(--p1)}
.hint{font-size:12px;color:var(--mu2);margin-top:5px}
fieldset{border:1px solid var(--line);border-radius:12px;padding:16px 16px 4px;margin:0 0 18px}
legend{font-size:12.5px;font-weight:800;color:var(--hi-d);padding:0 6px;text-transform:uppercase;letter-spacing:.03em}

/* ---- chips / badges ---- */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:700;white-space:nowrap}
.chip.p1{background:var(--p1-bg);color:var(--p1)}
.chip.p2{background:var(--p2-bg);color:var(--p2)}
.chip.p3{background:var(--p3-bg);color:var(--p3)}
.chip.pn{background:var(--grey-bg);color:var(--grey)}
.chip.ok{background:var(--ok-bg);color:var(--ok)}
.chip.hi{background:var(--hi-bg);color:var(--hi)}
.chip.st{background:var(--grey-bg);color:var(--ink)}
.chip.st.done{background:var(--ok-bg);color:var(--ok)}
.chip.st.wait{background:var(--p2-bg);color:var(--p2)}
.chip.st.new{background:var(--hi-bg);color:var(--hi-d)}
.chip.st.info{background:var(--info-bg);color:var(--info)}
.chip.st.recette{background:var(--teal-bg);color:var(--teal)}
.chip.st.rejected{background:var(--grey-bg);color:var(--mu2);text-decoration:line-through}

tr.row-done{background:var(--ok-bg)}
tr.row-info{background:var(--info-bg)}
tr.row-recette{background:var(--teal-bg)}
tr.row-wait{background:var(--p2-bg)}
tr.row-new{background:var(--hi-bg)}
tr.row-rejected{background:var(--grey-bg)}
tr.row-overdue{background:var(--p1-bg)}

/* ---- KPI tiles ---- */
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.kpi .n{font-size:28px;font-weight:800;letter-spacing:-.02em}
.kpi .l{font-size:12px;color:var(--mu);font-weight:600;margin-top:2px}
.kpi.hi .n{color:var(--hi)}
.kpi.ok .n{color:var(--ok)}
.kpi.p1 .n{color:var(--p1)}

/* ---- filters / toolbar ---- */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:18px 0}
.toolbar select,.toolbar input{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--card);color:var(--ink);font-size:13px}
.toolbar input[type=search]{min-width:220px;flex:1}

/* ---- table ---- */
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--card)}
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;min-width:920px}
table.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--mu);padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--grey-bg);position:sticky;top:0}
.tbl th.sortable{cursor:pointer;user-select:none}
.tbl th.sortable:hover{color:var(--hi)}
table.tbl td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tr.row:hover{background:var(--grey-bg)}
table.tbl td.desc{max-width:320px}
.row-toggle{cursor:pointer}
.detail-row td{background:var(--grey-bg);padding:16px 20px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.detail-grid .k{font-size:11px;text-transform:uppercase;color:var(--mu);font-weight:700;margin-bottom:3px}
.detail-grid .v{font-size:13.5px;white-space:pre-wrap}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr}}
.empty{padding:50px 20px;text-align:center;color:var(--mu)}

/* ---- bars ---- */
.barlist{display:flex;flex-direction:column;gap:10px}
.barrow{display:grid;grid-template-columns:130px 1fr 34px;gap:10px;align-items:center;font-size:12.5px}
.barrow .lbl{color:var(--mu);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bartrack{background:var(--grey-bg);border-radius:6px;height:9px;overflow:hidden}
.barfill{height:100%;border-radius:6px;background:var(--hi)}
.barrow .cnt{text-align:right;font-weight:700;color:var(--ink)}

/* ---- admin tabs ---- */
.tabs{display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:22px;padding-bottom:2px}
.tabs button{background:none;border:none;padding:9px 13px;border-radius:8px 8px 0 0;font-weight:700;color:var(--mu);font-size:13px}
.tabs button.on{color:var(--hi-d);background:var(--hi-bg)}

/* ---- toast ---- */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#22202E;color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
#toast.err{background:var(--p1-solid)}

/* ---- misc ---- */
.mut{color:var(--mu)}
.small{font-size:12.5px}
.center{text-align:center}
.divider{height:1px;background:var(--line);margin:22px 0}
.lockicon{font-size:40px;margin-bottom:10px}
.list-editor{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
.list-item{display:flex;align-items:center;gap:7px;background:var(--grey-bg);border-radius:99px;padding:5px 6px 5px 12px;font-size:12.5px;font-weight:600}
.list-item button{background:none;border:none;color:var(--mu);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1}
.list-item button:hover{background:var(--card);color:var(--p1)}
.banner{background:var(--hi-bg);border:1px solid var(--hi);color:var(--hi-d);border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.6;margin-bottom:20px}
.banner.warn{background:var(--p2-bg);border-color:var(--p2);color:var(--p2)}
.footer{padding:30px 0 60px;text-align:center;color:var(--mu2);font-size:12px}
.modal-bg{position:fixed;inset:0;background:rgba(20,25,40,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--card);border-radius:16px;max-width:420px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.checkline{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--ink)}
.checkline input{width:16px;height:16px}
.stat-strip{display:flex;gap:22px;flex-wrap:wrap;margin-top:8px}
.stat-strip .s{font-size:12.5px;color:var(--mu)}
.stat-strip .s b{color:var(--ink);font-size:14px}

/* ---- logo / theme toggle ---- */
.applogo{height:34px;width:auto;flex-shrink:0;transition:opacity .2s}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]) .applogo{opacity:.7}
}
:root[data-theme="dark"] .applogo{opacity:.7}
.theme-toggle{background:none;border:1px solid var(--line);border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--mu)}
.theme-toggle:hover{border-color:var(--hi)}

/* ---- KPI v2 (sparkline + delta) ---- */
.kpi{position:relative;overflow:hidden}
.kpi .kpi-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.kpi .n{font-size:26px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.kpi .delta{font-size:11px;font-weight:800;border-radius:99px;padding:2px 7px;white-space:nowrap}
.kpi .delta.up-good,.kpi .delta.down-good{background:var(--ok-bg);color:var(--ok)}
.kpi .delta.up-bad,.kpi .delta.down-bad{background:var(--p1-bg);color:var(--p1)}
.kpi .delta.flat{background:var(--grey-bg);color:var(--grey)}
.kpi .spark{display:block;margin-top:6px;width:100%;height:26px}

/* ---- vue toggle (tableau / cartes / kanban) ---- */
.viewtoggle{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.viewtoggle button{background:var(--card);border:none;padding:8px 13px;font-size:12.5px;font-weight:700;color:var(--mu);border-right:1px solid var(--line)}
.viewtoggle button:last-child{border-right:none}
.viewtoggle button.on{background:var(--hi-solid);color:#fff}

/* ---- cartes anomalies ---- */
.acard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.acard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;cursor:pointer;border-left:4px solid var(--grey)}
.acard.p1{border-left-color:var(--p1)}
.acard.p2{border-left-color:var(--p2)}
.acard.p3{border-left-color:var(--p3)}
.acard.overdue{background:var(--p1-bg)}
.acard .atop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.acard .adesc{font-size:13px;color:var(--ink);margin:8px 0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.acard .afoot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px}

/* ---- avatar pilote ---- */
.avatar{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:9.5px;font-weight:800;color:#fff;flex-shrink:0}
.avatar-row{display:flex;align-items:center;gap:6px}

/* ---- pastille d'ancienneté ---- */
.age-pill{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:99px;white-space:nowrap}
.age-pill.ok{background:var(--ok-bg);color:var(--ok)}
.age-pill.warn{background:var(--p2-bg);color:var(--p2)}
.age-pill.danger{background:var(--p1-bg);color:var(--p1)}

/* ---- barre de progression globale ---- */
.progress-global{background:var(--grey-bg);border-radius:99px;height:14px;overflow:hidden;display:flex}
.progress-global .seg-ok{background:var(--ok);height:100%}
.progress-global .seg-todo{background:var(--line);height:100%}
.progress-caption{display:flex;justify-content:space-between;font-size:12px;color:var(--mu);margin-top:6px;font-weight:600}

/* ---- donut ---- */
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:7px;font-size:12.5px}
.donut-legend .li{display:flex;align-items:center;gap:7px;cursor:pointer}
.donut-legend .sw{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.donut-legend .li:hover{color:var(--hi)}

/* ---- heatmap calendrier ---- */
.heatmap-scroll{overflow-x:auto;padding-bottom:6px}
.heatmap-months{display:flex;gap:3px;margin-bottom:4px;height:12px}
.heatmap-month{width:11px;flex-shrink:0;font-size:9.5px;color:var(--mu);white-space:nowrap;overflow:visible}
.heatmap-daylabels{display:flex;flex-direction:column;gap:3px;width:24px;flex-shrink:0;margin-top:16px}
.heatmap-daylabels span{height:11px;line-height:11px;font-size:9px;color:var(--mu)}
.heatmap-grid{display:flex;gap:3px}
.heatmap-col{display:flex;flex-direction:column;gap:3px}
.heatmap-cell{width:11px;height:11px;border-radius:3px;background:var(--grey-bg)}
.heatmap-legend{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);margin-top:8px}
.heatmap-legend .heatmap-cell{width:10px;height:10px}

/* ---- stepper cycle de vie ---- */
.stepper{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin:6px 0}
.stepper .step{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--mu2)}
.stepper .dot{width:20px;height:20px;border-radius:50%;background:var(--grey-bg);color:var(--mu2);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;border:2px solid var(--line)}
.stepper .step.done .dot{background:var(--ok-solid);color:#fff;border-color:var(--ok-solid)}
.stepper .step.current .dot{background:var(--hi-solid);color:#fff;border-color:var(--hi-solid)}
.stepper .step.done{color:var(--ok)}
.stepper .step.current{color:var(--hi)}
.stepper .bar{width:22px;height:2px;background:var(--line);margin:0 4px}
.stepper .bar.done{background:var(--ok)}
.stepper.rejected{color:var(--p1);font-weight:700;font-size:12.5px}

/* ---- kanban ---- */
.kanban-scroll{overflow-x:auto;padding-bottom:10px}
.kanban-board{display:flex;gap:12px;align-items:flex-start;min-height:60px}
.kanban-col{background:var(--grey-bg);border-radius:14px;padding:10px;width:250px;flex-shrink:0}
.kanban-col.dragover{outline:2px dashed var(--hi);outline-offset:-4px}
.kanban-col-h{display:flex;justify-content:space-between;align-items:center;padding:4px 6px 10px;font-size:12px;font-weight:800;text-transform:uppercase;color:var(--mu);letter-spacing:.02em}
.kanban-cards{display:flex;flex-direction:column;gap:8px;min-height:30px}
.kcard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--grey);border-radius:11px;padding:10px 11px;font-size:12.5px;box-shadow:var(--shadow)}
.kcard.p1{border-left-color:var(--p1)}
.kcard.p2{border-left-color:var(--p2)}
.kcard.p3{border-left-color:var(--p3)}
.kcard.overdue{background:var(--p1-bg)}
.kcard[draggable="true"]{cursor:grab}
.kcard.dragging{opacity:.4}
.kcard .kt{font-weight:700;margin-bottom:4px}
.kcard .kd{color:var(--mu);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.kcard .kf{display:flex;justify-content:space-between;align-items:center;gap:6px}

.kiosk{position:fixed;inset:0;background:radial-gradient(1100px 750px at 50% -8%,#332352 0%,#1B1628 45%,#120F1A 78%);color:#fff;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;overflow:hidden}
.kiosk .kiosk-exit{position:absolute;top:20px;right:24px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:#fff;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:700}
.kiosk .kiosk-eyebrow{font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#C9A2EF;text-align:center;margin-bottom:10px}
.kiosk h2{font-size:38px;font-weight:800;color:#fff;margin-bottom:36px;text-align:center;letter-spacing:-.01em}
.kiosk .kiosk-kpis{display:flex;gap:56px;flex-wrap:wrap;justify-content:center}
.kiosk .kiosk-kpis .n{font-size:118px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 60px currentColor}
.kiosk .kiosk-kpis .l{font-size:16px;opacity:.72;margin-top:14px;text-align:center;font-weight:500}
.kiosk .kiosk-dots{display:flex;gap:9px;position:absolute;bottom:28px}
.kiosk .kiosk-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:background .2s ease-out,transform .2s ease-out}
.kiosk .kiosk-dots span.on{background:#C9A2EF;transform:scale(1.3)}
.kiosk .kiosk-body{width:100%;max-width:1080px}
.kiosk .kiosk-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#fff;width:52px;height:52px;border-radius:50%;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.kiosk .kiosk-nav:hover{background:rgba(255,255,255,.18)}
.kiosk .kiosk-prev{left:20px}
.kiosk .kiosk-next{right:20px}
.kiosk .donut-wrap svg{width:260px;height:260px}
.kiosk .donut-legend{font-size:16px;gap:11px}
.kiosk .donut-legend .sw{width:12px;height:12px}
.kiosk .kiosk-body svg text{fill:#fff}
.kiosk .kiosk-body .small.mut{font-size:14px;color:rgba(255,255,255,.75)}
.kiosk .donut-legend{color:#fff}
.kiosk .barlist{gap:16px}
.kiosk .barrow{grid-template-columns:190px 1fr 50px;font-size:17px;gap:16px}
.kiosk .barrow .lbl{color:rgba(255,255,255,.85)}
.kiosk .bartrack{background:rgba(255,255,255,.12);height:14px;border-radius:7px}
.kiosk .barfill{background:linear-gradient(90deg,#8A5FC9,#C9A2EF);border-radius:7px}
.kiosk .barrow .cnt{color:#fff;font-size:19px;font-weight:800}
.kiosk .kiosk-body svg[viewBox^="0 0 640"]{height:320px!important}

/* ---- animations ---- */
.fade-enter{animation:fadeIn .28s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion: reduce){
  .fade-enter{animation:none}
  body,.card,.topbar,.kpi,.tblwrap,.info-panel,.choice{transition:none}
}

@media print{
  .noprint{display:none!important}
  body{background:#fff}
  .wrap{max-width:100%}
  .card,.tblwrap{box-shadow:none;border-color:#ccc}
  table.tbl{min-width:0;font-size:11px}
}

function uid(){ return "a-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2,8); }
function localISODate(d){
  var pad = function(n){ return (n<10?"0":"")+n; };
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}
function todayISO(){ return localISODate(new Date()); }
function fmtDate(iso){
  if(!iso) return "–";
  var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso);
  if(!m) return iso;
  return m[3]+"/"+m[2]+"/"+m[1];
}
function nowISOTime(){ return new Date().toISOString(); }
function fmtDateTime(iso){
  if(!iso) return "–";
  var d = new Date(iso);
  if(isNaN(d.getTime())) return iso;
  var pad = function(n){ return (n<10?"0":"")+n; };
  return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear()+" "+pad(d.getHours())+":"+pad(d.getMinutes());
}
function daysSince(dateStr){
  if(!dateStr) return null;
  var d = new Date(dateStr+"T00:00:00");
  if(isNaN(d.getTime())) return null;
  var now = new Date(); now.setHours(0,0,0,0);
  return Math.round((now-d)/86400000);
}
function truncate(s,n){ s=s||""; return s.length>n ? s.slice(0,n-1)+"…" : s; }
function setDeep(path, value){
  var parts = path.split(".");
  var obj = S;
  for(var i=0;i<parts.length-1;i++){
    if(obj[parts[i]]===undefined) obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length-1]] = value;
}
var toastTimer = null;
function toast(msg, isErr){
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = isErr ? "show err" : "show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.className=""; }, 2800);
}
function sha256hex(str){
  return crypto.subtle.digest("SHA-256", new TextEncoder().encode(str)).then(function(buf){
    return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
  });
}
var PIN_FAILS_KEY = "pinFailCount";
var PIN_LOCK_KEY = "pinLockUntil";
var PIN_MAX_ATTEMPTS = 5;
var PIN_BASE_LOCK_SECONDS = 30;
function pinLockRemainingMs(){
  var until = parseInt(localStorage.getItem(PIN_LOCK_KEY)||"0", 10);
  return Math.max(0, until - Date.now());
}
function pinRegisterFail(){
  var fails = (parseInt(localStorage.getItem(PIN_FAILS_KEY)||"0", 10)) + 1;
  localStorage.setItem(PIN_FAILS_KEY, String(fails));
  if(fails>=PIN_MAX_ATTEMPTS){
    var lockSeconds = PIN_BASE_LOCK_SECONDS * Math.pow(2, fails-PIN_MAX_ATTEMPTS);
    localStorage.setItem(PIN_LOCK_KEY, String(Date.now() + lockSeconds*1000));
  }
}
function pinResetFails(){
  localStorage.removeItem(PIN_FAILS_KEY);
  localStorage.removeItem(PIN_LOCK_KEY);
}
function trackMyTicket(id){
  try{
    var ids = JSON.parse(localStorage.getItem(MY_TICKETS_KEY)||"[]");
    if(ids.indexOf(id)===-1){ ids.unshift(id); localStorage.setItem(MY_TICKETS_KEY, JSON.stringify(ids)); }
  }catch(e){}
}
function getMyTicketIds(){
  try{ return JSON.parse(localStorage.getItem(MY_TICKETS_KEY)||"[]"); }catch(e){ return []; }
}
function getMyTicketsSeen(){
  try{ return JSON.parse(localStorage.getItem(MY_TICKETS_SEEN_KEY)||"{}"); }catch(e){ return {}; }
}
function markMyTicketSeen(id, statut){
  try{
    var seen = getMyTicketsSeen();
    seen[id] = statut;
    localStorage.setItem(MY_TICKETS_SEEN_KEY, JSON.stringify(seen));
  }catch(e){}
}
function myTicketsUpdateCount(){
  var ids = getMyTicketIds(), seen = getMyTicketsSeen(), n = 0;
  ids.forEach(function(id){
    var a = S.anomalies.filter(function(x){ return x.id===id; })[0];
    if(a && seen[id]!==undefined && seen[id]!==a.statut) n++;
  });
  return n;
}
function downloadFile(filename, content, mime){
  var blob = new Blob([content], {type: mime});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

/* ============================= PERSISTANCE ============================= */
function seedFromSource(){
  var raw = document.getElementById("seed-data");
  var seed = [];
  try{ seed = JSON.parse(raw.textContent); }catch(e){ seed = []; }
  var batch = db.batch();
  seed.forEach(function(a){ batch.set(db.collection("anomalies").doc(a.id), a); });
  batch.set(db.doc("settings/global"), { outils: OUTILS_DEFAULT.slice(), statuts: STATUTS_DEFAULT.slice() });
  // Note: secrets/pinHash n'est pas seedable depuis le client (règles Firestore) --
  // sur un tout nouveau projet, seed-le une fois via le SDK Admin (voir Cloud Functions).
  return batch.commit()["catch"](function(e){ toast("Erreur d'initialisation : "+e.message, true); });
}
function clearAllRemote(){
  return db.collection("anomalies").get().then(function(snap){
    var batch = db.batch();
    snap.forEach(function(doc){ batch.delete(doc.ref); });
    return batch.commit();
  })["catch"](function(e){ toast("Erreur : "+e.message, true); });
}
function saveAnomaly(a){
  db.collection("anomalies").doc(a.id).set(a)["catch"](function(e){ toast("Erreur d'enregistrement : "+e.message, true); });
}
function deleteAnomalyRemote(id){
  db.collection("anomalies").doc(id).delete()["catch"](function(e){ toast("Erreur de suppression : "+e.message, true); });
}
function pushNotification(a){

  db.collection("notifications").doc(nid).set({

    site: a.site||"", priorite: a.priorite||"", ts: nowISOTime()
  })["catch"](function(e){ toast("Erreur de notification : "+e.message, true); });
}
function deleteNotificationRemote(id){
  db.collection("notifications").doc(id).delete()["catch"](function(e){ toast("Erreur de suppression : "+e.message, true); });
}
function clearAllNotificationsRemote(){
  return db.collection("notifications").get().then(function(snap){
    var batch = db.batch();
    snap.forEach(function(doc){ batch.delete(doc.ref); });
    return batch.commit();
  })["catch"](function(e){ toast("Erreur : "+e.message, true); });
}
function saveSettings(){
  db.doc("settings/global").set(S.settings)["catch"](function(e){ toast("Erreur d'enregistrement : "+e.message, true); });
}
function archiveNow(){
  var doc = {
    archivedAt: nowISOTime(),
    auteur: S.currentAuthor||"Administration",
    anomalies: S.anomalies,
    settings: S.settings
  };
  return db.collection("archives").doc(uid()).set(doc);
}
function restoreFromArchive(archiveId){
  var arch = S.archives.filter(function(a){ return a._id===archiveId; })[0];
  if(!arch) return Promise.reject(new Error("Archive introuvable."));
  return clearAllRemote().then(function(){
    var batch = db.batch();
    (arch.anomalies||[]).forEach(function(a){ batch.set(db.collection("anomalies").doc(a.id), a); });
    if(arch.settings) batch.set(db.doc("settings/global"), arch.settings);
    return batch.commit();
  });
}
function load(){
  try{ S.currentAuthor = localStorage.getItem(AUTHOR_KEY) || ""; }catch(e){}
  try{ if(localStorage.getItem("adminAuthed")==="1") S.authed = true; }catch(e){}
  db.collection("anomalies").onSnapshot(function(snap){
    var arr = [];
    snap.forEach(function(doc){ arr.push(doc.data()); });
    S.anomalies = arr;
    render();
  }, function(e){ toast("Erreur de synchronisation : "+e.message, true); });
  db.collection("notifications").orderBy("ts","desc").limit(200).onSnapshot(function(snap){
    var arr = [];
    snap.forEach(function(doc){ arr.push(doc.data()); });
    if(_notifInitialized){
      snap.docChanges().forEach(function(ch){
        if(ch.type==="added"){
          var n = ch.doc.data();
          toast("Nouvelle anomalie : "+n.outil+" – "+truncate(n.descriptif,60));
        }
      });
    } else {
      _notifInitialized = true;
    }
    S.notifications = arr;
    render();
  }, function(e){ toast("Erreur de synchronisation : "+e.message, true); });
  db.doc("settings/global").onSnapshot(function(doc){
    var data = doc.exists ? doc.data() : {};
    S.settings = Object.assign({outils:OUTILS_DEFAULT.slice(),statuts:STATUTS_DEFAULT.slice()}, data);
    OUTILS_DEFAULT.forEach(function(o){ if(S.settings.outils.indexOf(o)===-1) S.settings.outils.push(o); });
    STATUTS_DEFAULT.forEach(function(st){ if(S.settings.statuts.indexOf(st)===-1) S.settings.statuts.push(st); });
    render();
  }, function(e){ toast("Erreur de synchronisation : "+e.message, true); });
  db.collection("archives").orderBy("archivedAt","desc").limit(10).onSnapshot(function(snap){
    var arr = [];
    snap.forEach(function(doc){ arr.push(Object.assign({_id:doc.id}, doc.data())); });
    S.archives = arr;
    render();
  }, function(e){});
  db.collection("anomalies").limit(1).get().then(function(snap){
    if(snap.empty) seedFromSource();
  });
}
function save(){
  try{ localStorage.setItem(AUTHOR_KEY, S.currentAuthor||""); }catch(e){}
}
function loadTheme(){
  var t = "auto";

function applyTheme(t){
  if(t==="auto") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme", t);
}
function setTheme(t){
  S.theme = t;
  applyTheme(t);
  try{ localStorage.setItem(THEME_KEY, t); }catch(e){}
  render();
}

/* ============================= CALCULS ============================= */
function computeKPIs(list){
  var total = list.length;
  var ouverts = list.filter(function(a){ return STATUTS_OUVERTS.indexOf(a.statut)===-1; }).length;
  var pilotesSet = {};
  list.forEach(function(a){ if(a.pilote) pilotesSet[a.pilote.trim().toLowerCase()]=1; });
  var pilotes = Object.keys(pilotesSet).length;
  var mep = list.filter(function(a){ return a.mep || a.statut==="Résolu"; }).length;
  var resolus = list.filter(function(a){ return a.statut==="Résolu" || a.statut==="Fermé"; }).length;
  var taux = total ? Math.round(resolus/total*100) : 0;
  return {total:total, ouverts:ouverts, pilotes:pilotes, mep:mep, resolus:resolus, taux:taux};
}
function groupCount(list, field){
  var m = {};
  list.forEach(function(a){ var v=(a[field]||"Non renseigné").toString().trim()||"Non renseigné"; m[v]=(m[v]||0)+1; });
  return Object.keys(m).map(function(k){ return {label:k, count:m[k]}; }).sort(function(a,b){ return b.count-a.count; });
}
function barListHTML(groups, max, field){
  if(!groups.length) return '<p class="mut small">Aucune donnée.</p>';
  var top = groups.slice(0, max||8);

  return '<div class="barlist">' + top.map(function(g){
    var pct = maxCount ? Math.round(g.count/maxCount*100) : 0;
    var clickAttrs = field ? ' data-a="quick-filter" data-v="'+field+":"+esc(g.label)+'" style="cursor:pointer"' : "";
    return '<div class="barrow"'+clickAttrs+'><div class="lbl" title="'+esc(g.label)+'">'+esc(g.label)+'</div><div class="bartrack"><div class="barfill" style="width:'+pct+'%"></div></div><div class="cnt">'+g.count+'</div></div>';
  }).join("") + "</div>";
}
var HIST_FIELDS = [
  ["site","Site"],["outil","Outil"],["descriptif","Descriptif"],["severite","Sévérité"],["priorite","Priorité"],
  ["statut","Statut"],["pilote","Pilote"],["correctif","Correctif"],["contournement","Contournement"],

];
function diffSummary(before, after){
  var lines = [];
  HIST_FIELDS.forEach(function(f){
    var k=f[0], label=f[1];
    var a = before[k], b = after[k];
    if(k==="mep"){ a = a?"Oui":"Non"; b = b?"Oui":"Non"; }
    else if(k==="echeance" || k==="dateResolution"){ a = fmtDate(a); b = fmtDate(b); }
    else { a = a||"–"; b = b||"–"; }
    if(String(a)!==String(b)) lines.push(label+" : "+a+" → "+b);
  });
  return lines;

function weekKey(dateStr){
  var d = new Date(dateStr+"T00:00:00");
  if(isNaN(d.getTime())) return null;
  var day = (d.getDay()+6)%7;
  d.setDate(d.getDate()-day);
  return localISODate(d);
}
function lastNWeeks(n){
  var weeks = [];
  var d = new Date();
  var day = (d.getDay()+6)%7;
  d.setDate(d.getDate()-day);
  for(var i=n-1;i>=0;i--){
    var w = new Date(d);
    w.setDate(w.getDate()-7*i);
    weeks.push(localISODate(w));
  }
  return weeks;
}
function trendData(list, n){
  var weeks = lastNWeeks(n||TREND_WEEKS);
  var idx = {};
  weeks.forEach(function(w,i){ idx[w]=i; });
  var created = weeks.map(function(){ return 0; });
  var resolved = weeks.map(function(){ return 0; });
  list.forEach(function(a){
    if(a.dateDeclaration){ var wk = weekKey(a.dateDeclaration); if(wk && idx[wk]!==undefined) created[idx[wk]]++; }
    if(a.dateResolution){ var wk2 = weekKey(a.dateResolution); if(wk2 && idx[wk2]!==undefined) resolved[idx[wk2]]++; }
  });
  return {weeks:weeks, created:created, resolved:resolved};
}
function smoothPath(pts){
  if(pts.length<2) return "M"+(pts[0]?pts[0][0]+","+pts[0][1]:"0,0");
  var d = "M"+pts[0][0]+","+pts[0][1];
  for(var i=1;i<pts.length-1;i++){
    var mx = (pts[i][0]+pts[i+1][0])/2, my = (pts[i][1]+pts[i+1][1])/2;
    d += " Q"+pts[i][0]+","+pts[i][1]+" "+mx+","+my;
  }
  var last = pts[pts.length-1];
  d += " L"+last[0]+","+last[1];
  return d;
}
function trendChartHTML(list, n){
  var t = trendData(list, n);
  var w = 640, h = 150, padL = 6, padR = 6, padT = 12, padB = 22;
  var innerW = w-padL-padR, innerH = h-padT-padB;
  var maxV = Math.max(1, Math.max.apply(null, t.created.concat(t.resolved)));
  var stepX = t.weeks.length>1 ? innerW/(t.weeks.length-1) : 0;
  function pt(v,i){ return [padL+i*stepX, padT+innerH-(v/maxV*innerH)]; }
  var createdPts = t.created.map(function(v,i){ return pt(v,i); });
  var resolvedPts = t.resolved.map(function(v,i){ return pt(v,i); });
  var createdPath = smoothPath(createdPts);
  var resolvedPath = smoothPath(resolvedPts);
  var base = padT+innerH;
  var createdArea = createdPath+" L"+(padL+innerW)+","+base+" L"+padL+","+base+" Z";
  var resolvedArea = resolvedPath+" L"+(padL+innerW)+","+base+" L"+padL+","+base+" Z";
  var dots = t.weeks.map(function(wk,i){
    return '<circle cx="'+createdPts[i][0]+'" cy="'+createdPts[i][1]+'" r="10" fill="transparent"><title>Semaine du '+esc(fmtDate(wk))+" : "+t.created[i]+" créée(s), "+t.resolved[i]+' résolue(s)</title></circle>';
  }).join("");
  var showEvery = t.weeks.length>8 ? 2 : 1;
  var labels = t.weeks.map(function(wk,i){
    if(i%showEvery!==0 && i!==t.weeks.length-1) return "";
    return '<text x="'+createdPts[i][0]+'" y="'+(h-6)+'" text-anchor="middle" style="fill:var(--mu);font-size:9px;font-family:inherit">'+esc(fmtDate(wk).slice(0,5))+"</text>";
  }).join("");
  return '<div>'+
    '<div style="display:flex;gap:14px;margin-bottom:6px" class="small mut">'+
      '<span><span style="display:inline-block;width:9px;height:9px;background:var(--hi);border-radius:2px;margin-right:5px"></span>Créées</span>'+
      '<span><span style="display:inline-block;width:9px;height:9px;background:var(--ok);border-radius:2px;margin-right:5px"></span>Résolues (date de résolution renseignée)</span>'+
    "</div>"+
    '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;height:150px">'+
      '<defs>'+
        '<linearGradient id="gradCreated" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" style="stop-color:var(--hi);stop-opacity:0.32"/><stop offset="100%" style="stop-color:var(--hi);stop-opacity:0"/></linearGradient>'+
        '<linearGradient id="gradResolved" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" style="stop-color:var(--ok);stop-opacity:0.32"/><stop offset="100%" style="stop-color:var(--ok);stop-opacity:0"/></linearGradient>'+
      "</defs>"+
      '<path d="'+createdArea+'" style="fill:url(#gradCreated);stroke:none"/>'+
      '<path d="'+resolvedArea+'" style="fill:url(#gradResolved);stroke:none"/>'+
      '<path d="'+createdPath+'" style="fill:none;stroke:var(--hi);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"/>'+
      '<path d="'+resolvedPath+'" style="fill:none;stroke:var(--ok);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"/>'+
      dots+labels+
    "</svg>"+
  "</div>";
}
function donutChartHTML(list, k){

    "</svg>"+

function sparklineSVG(values, colorVar){
  if(!values || values.length<2) return "";
  var w = 90, h = 26, pad = 2;
  var max = Math.max.apply(null, values), min = Math.min.apply(null, values);
  var range = (max-min) || 1;
  var stepX = (w-2*pad)/(values.length-1);
  var pts = values.map(function(v,i){
    var x = pad+i*stepX;
    var y = pad + (h-2*pad) - ((v-min)/range)*(h-2*pad);
    return [x,y];
  });
  var path = smoothPath(pts);
  var last = pts[pts.length-1];
  return '<svg class="spark" viewBox="0 0 '+w+" "+h+'" preserveAspectRatio="none">'+
    '<path d="'+path+'" style="fill:none;stroke:'+colorVar+';stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round"/>'+
    '<circle cx="'+last[0]+'" cy="'+last[1]+'" r="2.2" style="fill:'+colorVar+'"/>'+
  "</svg>";
}
function weeklyFlow(list, dateField, weeks){
  var wks = lastNWeeks(weeks);
  var idx = {}; wks.forEach(function(w,i){ idx[w]=i; });
  var counts = wks.map(function(){ return 0; });
  list.forEach(function(a){
    var d = a[dateField];
    if(!d) return;
    var wk = weekKey(d);
    if(wk && idx[wk]!==undefined) counts[idx[wk]]++;
  });
  return counts;
}
function weeklyPilotesFlow(list, weeks){
  var wks = lastNWeeks(weeks);
  var idx = {}; wks.forEach(function(w,i){ idx[w]=i; });
  var sets = wks.map(function(){ return {}; });
  list.forEach(function(a){
    if(!a.pilote || !a.dateDeclaration) return;
    var wk = weekKey(a.dateDeclaration);
    if(wk && idx[wk]!==undefined) sets[idx[wk]][a.pilote.trim().toLowerCase()]=1;
  });
  return sets.map(function(s){ return Object.keys(s).length; });
}
function weeklyTauxApprox(list, weeks){
  var wks = lastNWeeks(weeks);
  return wks.map(function(w,i){
    var cutoff = wks[i+1];
    if(!cutoff){ var d=new Date(); d.setDate(d.getDate()+7); cutoff = localISODate(d); }
    var asOf = list.filter(function(a){ return a.dateDeclaration && a.dateDeclaration<cutoff; });
    return computeKPIs(asOf).taux;
  });
}
function deltaHTML(cur, prev, polarity){
  var diff = cur-prev;
  if(diff===0) return '<span class="delta flat">＝</span>';
  var arrow = diff>0 ? "▲" : "▼";
  var cls = "flat";
  if(polarity==="up") cls = diff>0 ? "up-good" : "down-bad";
  else if(polarity==="down") cls = diff<0 ? "down-good" : "up-bad";
  return '<span class="delta '+cls+'">'+arrow+" "+Math.abs(diff)+(polarity==="pct"?"pt":"")+"</span>";
}
function kpiTileV2(n,label,cls,sparkValues,sparkColor,deltaEl,countTarget,isPercent){

    '<div class="l">'+esc(label)+"</div>"+
    (sparkValues && sparkValues.length>1 ? sparklineSVG(sparkValues, sparkColor) : "")+
  "</div>";
}
function buildKpiTilesHTML(list){

  var netFlow = createdFlow.map(function(c,i){ return c-resolvedFlow[i]; });

  var lastIdx = createdFlow.length-1, prevIdx = lastIdx-1;
  return '<div class="grid5" style="margin:18px 0">'+

    kpiTileV2(k.pilotes,"Pilotes engagés","hi",pilotesFlow,"var(--hi)",deltaHTML(pilotesFlow[lastIdx],pilotesFlow[prevIdx],"neutral"),k.pilotes,false)+
    kpiTileV2(k.mep,"MEP réalisées","ok",resolvedFlow,"var(--ok)",deltaHTML(resolvedFlow[lastIdx],resolvedFlow[prevIdx],"up"),k.mep,false)+
    kpiTileV2(k.taux+"%","Taux de résolution","ok",tauxFlow,"var(--ok)",deltaHTML(tauxFlow[lastIdx],tauxFlow[prevIdx],"up"),k.taux,true)+
  "</div>";
}
function hashStr(s){ var h=0; for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return Math.abs(h); }
function initials(name){
  name = (name||"").trim();
  if(!name) return "?";
  var parts = name.split(/\s+/);
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function avatarHTML(name){
  if(!name) return "";
  var color = AVATAR_COLORS[hashStr(name)%AVATAR_COLORS.length];
  return '<span class="avatar" style="background:'+color+'" title="'+esc(name)+'">'+esc(initials(name))+"</span>";
}
function ageBadgeHTML(a){
  if(STATUTS_OUVERTS.indexOf(a.statut)!==-1) return "";
  var overdue = a.echeance && daysSince(a.echeance)>0;
  if(overdue) return '<span class="age-pill danger">⚠ En retard</span>';
  var age = daysSince(a.dateDeclaration);
  if(age===null || age<0) return "";
  if(age<=3) return '<span class="age-pill ok">J+'+age+"</span>";
  if(age<=15) return '<span class="age-pill warn">J+'+age+"</span>";
  return '<span class="age-pill danger">J+'+age+"</span>";
}
function progressGlobalHTML(k){
  var pct = k.total ? Math.round(k.resolus/k.total*100) : 0;
  return '<div class="progress-global"><div class="seg-ok" style="width:'+pct+'%"></div><div class="seg-todo" style="width:'+(100-pct)+'%"></div></div>'+
    '<div class="progress-caption"><span>'+k.resolus+" résolues</span><span>"+(k.total-k.resolus)+" restantes</span></div>";
}
function heatLevelColor(level){
  var colors = ["var(--grey-bg)","#D8C3F0","#B990E6","#8B4FD1","#5B2A8C"];
  return colors[level];
}
function heatmapHTML(list, weeksBack){
  weeksBack = weeksBack || 26;
  var counts = {};
  list.forEach(function(a){ if(a.dateDeclaration) counts[a.dateDeclaration] = (counts[a.dateDeclaration]||0)+1; });
  var end = new Date(); end.setHours(0,0,0,0);
  var endDow = (end.getDay()+6)%7;
  end.setDate(end.getDate() + (6-endDow));
  var start = new Date(end); start.setDate(start.getDate() - (weeksBack*7-1));
  var today = todayISO();
  var weeks = [];
  var cur = new Date(start);
  for(var w=0; w<weeksBack; w++){
    var days = [];
    for(var d=0; d<7; d++){
      var iso = localISODate(cur);
      var c = counts[iso]||0;
      days.push({iso:iso, c:c, level: c===0?0: c<=1?1: c<=3?2: c<=6?3:4, future: iso>today});
      cur.setDate(cur.getDate()+1);
    }
    weeks.push(days);
  }
  var lastMonth = null;
  var monthRow = weeks.map(function(days){
    var m = new Date(days[0].iso+"T00:00:00").getMonth();
    var label = "";
    if(m!==lastMonth){ label = new Date(days[0].iso+"T00:00:00").toLocaleDateString("fr-FR",{month:"short"}); lastMonth = m; }
    return '<div class="heatmap-month">'+esc(label)+"</div>";
  }).join("");
  var grid = weeks.map(function(days){
    return '<div class="heatmap-col">'+days.map(function(dd){
      return '<div class="heatmap-cell" style="background:'+(dd.future?"transparent":heatLevelColor(dd.level))+'"'+(dd.future?"":' title="'+esc(fmtDate(dd.iso))+" : "+dd.c+' anomalie(s) déclarée(s)"')+"></div>";
    }).join("")+"</div>";
  }).join("");
  var dayLabels = ["Lun","","Mer","","Ven","",""].map(function(l){ return '<span>'+esc(l)+"</span>"; }).join("");
  return '<p class="small mut" style="margin-bottom:10px">Chaque case = un jour. Plus la couleur est foncée, plus il y a eu d’anomalies <b>déclarées</b> ce jour-là (survole une case pour le détail).</p>'+
    '<div class="heatmap-scroll">'+
      '<div style="display:flex;gap:3px">'+
        '<div class="heatmap-daylabels">'+dayLabels+"</div>"+
        '<div><div class="heatmap-months">'+monthRow+"</div>"+
        '<div class="heatmap-grid">'+grid+"</div></div>"+
      "</div>"+
    "</div>"+
    '<div class="heatmap-legend">Moins '+
      [0,1,2,3,4].map(function(l){ return '<div class="heatmap-cell" style="background:'+heatLevelColor(l)+'"></div>'; }).join("")+
    " Plus</div>";
}
var LIFECYCLE = ["À qualifier","En cadrage","Analyse SI","En attente livraison correctif","Test recette validé","Résolu"];
function stepperHTML(a){
  if(a.statut==="Pas une anomalie") return '<div class="stepper rejected">✕ Classée « pas une anomalie »</div>';
  var pos = LIFECYCLE.indexOf(a.statut==="Fermé"?"Résolu":(a.statut==="Attente info"?"Analyse SI":(a.statut==="Surveillance"?"Résolu":a.statut)));
  if(pos===-1) pos = 0;
  var steps = LIFECYCLE.map(function(s,i){
    var cls = i<pos?"done":(i===pos?"current":"");
    var bar = i>0 ? '<div class="bar'+(i<=pos?" done":"")+'"></div>' : "";
    return bar+'<div class="step '+cls+'"><span class="dot">'+(i<pos?"✓":(i+1))+"</span>"+esc(s)+"</div>";
  }).join("");
  var extra = a.statut==="Fermé" ? '<span class="chip st done" style="margin-left:8px">Fermé</span>' : (a.statut==="Attente info" ? '<span class="chip st wait" style="margin-left:8px">En attente d’info</span>' : (a.statut==="Surveillance" ? '<span class="chip st wait" style="margin-left:8px">Surveillance</span>' : ""));
  return '<div class="stepper">'+steps+extra+"</div>";
}
function runCountups(){
  document.querySelectorAll("[data-countup]").forEach(function(el){
    var target = parseInt(el.dataset.countup, 10);
    if(isNaN(target)) return;
    var isPct = el.dataset.percent==="1";
    if(reduceMotion){ el.textContent = target+(isPct?"%":""); return; }
    var t0 = null, duration = 550;
    function step(t){
      if(!t0) t0 = t;
      var p = Math.min(1, (t-t0)/duration);
      var eased = 1-Math.pow(1-p,3);
      var val = Math.round(target*eased);
      el.textContent = val+(isPct?"%":"");
      if(p<1) requestAnimationFrame(step);
      else el.textContent = target+(isPct?"%":"");
    }
    requestAnimationFrame(step);
  });
}

function statutCategory(s){

  if(s==="En attente livraison correctif"||s==="Attente info"||s==="Surveillance") return "wait";

  if(s==="Pas une anomalie") return "rejected";

}

function pageContent(){
  if(S.page==="declare") return renderDeclare();
  if(S.page==="mytickets") return renderMyTickets();
  if(S.page==="consult") return renderConsult();
  if(S.page==="login") return renderLogin();
  if(S.page==="admin") return S.authed ? renderAdmin() : renderLogin();
  return renderHome();
}
var _lastRenderKey = null;
function render(){
  if(S.page==="kiosk"){ kioskRender(); return; }
  var el = document.getElementById("app");
  el.classList.remove("fade-enter");
  void el.offsetWidth;
  el.innerHTML = topbar() + pageContent() + footer();
  el.classList.add("fade-enter");
  var key = S.page+"|"+S.adminTab+"|"+(S.page==="declare"?S.declareDone:"");
  if(key!==_lastRenderKey) window.scrollTo(0,0);
  _lastRenderKey = key;
  runCountups();
}

/* ============================= CONSULTATION ============================= */
function filteredAnomalies(){
  var f = S.filters;
  return S.anomalies.filter(function(a){
    if(f.site!=="all" && a.site!==f.site) return false;
    if(f.outil!=="all" && a.outil!==f.outil) return false;
    if(f.statut!=="all" && a.statut!==f.statut) return false;
    if(f.priorite!=="all" && (a.priorite||"")!==f.priorite) return false;
    if(f.q){
      var q = f.q.toLowerCase();
      var hay = [a.outil,a.descriptif,a.ticket,a.jira,a.declarant,a.site,a.pilote,a.commentaire].join(" ").toLowerCase();
      if(hay.indexOf(q)===-1) return false;
    }
    return true;
  });
}

var pinLockTimer = null;
function ensurePinLockTimer(){
  if(pinLockTimer) return;
  pinLockTimer = setInterval(function(){
    if(S.page!=="admin" || S.authed || pinLockRemainingMs()<=0){ clearInterval(pinLockTimer); pinLockTimer=null; if(S.page==="admin" && !S.authed) render(); return; }
    render();
  }, 1000);
}
function renderLogin(){
  var lockMs = pinLockRemainingMs();

  var lockSeconds = Math.ceil(lockMs/1000);
  return '<div class="narrow section center">'+
    '<div class="lockicon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none"><rect x="5" y="10.5" width="14" height="10" rx="2.2" stroke="currentColor" stroke-width="1.6"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="15" r="1.3" fill="currentColor"/><path d="M12 16.3V18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></div>'+

    '<div style="max-width:280px;margin:22px auto 0">'+

/* ============================= EXPORT POWERPOINT (ZIP + OOXML fait maison) ============================= */
var CRC_TABLE = (function(){
  var table = [];
  for(var n=0;n<256;n++){
    var c = n;
    for(var k=0;k<8;k++){ c = (c&1) ? (0xEDB88320 ^ (c>>>1)) : (c>>>1); }
    table[n] = c>>>0;
  }
  return table;
})();
function crc32(bytes){
  var crc = 0xFFFFFFFF;
  for(var i=0;i<bytes.length;i++){ crc = (crc>>>8) ^ CRC_TABLE[(crc ^ bytes[i]) & 0xFF]; }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}
function dosDateTime(){
  var d = new Date();
  var time = ((d.getHours()&31)<<11) | ((d.getMinutes()&63)<<5) | (Math.floor(d.getSeconds()/2)&31);
  var date = (((d.getFullYear()-1980)&127)<<9) | (((d.getMonth()+1)&15)<<5) | (d.getDate()&31);
  return {time:time, date:date};
}
function buildZip(files){
  var encoder = new TextEncoder();
  var dt = dosDateTime();
  var localParts = [], centralParts = [], offset = 0;
  files.forEach(function(f){
    var nameBytes = encoder.encode(f.name);
    var data = (f.data instanceof Uint8Array) ? f.data : encoder.encode(f.data);
    var crc = crc32(data);
    var lh = new Uint8Array(30 + nameBytes.length);
    var lv = new DataView(lh.buffer);
    lv.setUint32(0, 0x04034b50, true);
    lv.setUint16(4, 20, true);
    lv.setUint16(6, 0, true);
    lv.setUint16(8, 0, true);
    lv.setUint16(10, dt.time, true);
    lv.setUint16(12, dt.date, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, data.length, true);
    lv.setUint32(22, data.length, true);
    lv.setUint16(26, nameBytes.length, true);
    lv.setUint16(28, 0, true);
    lh.set(nameBytes, 30);
    localParts.push(lh, data);

    var ch = new Uint8Array(46 + nameBytes.length);
    var cv = new DataView(ch.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, dt.time, true);
    cv.setUint16(14, dt.date, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, data.length, true);
    cv.setUint32(24, data.length, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    ch.set(nameBytes, 46);
    centralParts.push(ch);

    offset += lh.length + data.length;
  });
  var centralSize = centralParts.reduce(function(a,p){ return a+p.length; }, 0);
  var centralOffset = offset;
  var eocd = new Uint8Array(22);
  var ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, centralOffset, true);
  ev.setUint16(20, 0, true);
  return new Blob(localParts.concat(centralParts, [eocd]), {type:"application/vnd.openxmlformats-officedocument.presentationml.presentation"});

function generateComitologiePptx(){
  var list = S.anomalies.filter(function(a){ return STATUTS_OUVERTS.indexOf(a.statut)===-1; });
  var groups = [["P1","P1 · Bloquant","C93E52"],["P2","P2 · Majeur","C77A28"],["P3","P3 · Modéré","B99A15"],["","Non priorisé","8A93A8"]];
  var k = computeKPIs(S.anomalies);
  var monthLabel = new Date().toLocaleDateString("fr-FR", {month:"long", year:"numeric"});
  var headers = ["Outil","Anomalie / irritant","Correctif prévu / en cours","Contournement terrain","Échéance","Statut","Pilote"];
  var colWidths = [1300000,2750000,1950000,1950000,900000,1450000,940000];

  var slidesXml = [pptxTitleSlideXml(k, monthLabel)];
  groups.forEach(function(g){
    var rows = list.filter(function(a){ return (a.priorite||"")===g[0]; });
    if(!rows.length) return;
    var pages = chunk(rows, 7);
    pages.forEach(function(pageRows, idx){
      var label = g[1] + (pages.length>1 ? " ("+(idx+1)+"/"+pages.length+")" : "");
      var tableRows = pageRows.map(function(a){
        return [a.outil, pptxTrunc(a.descriptif,90), pptxTrunc(a.correctif||"–",70), pptxTrunc(a.contournement||"–",70), fmtDate(a.echeance), a.statut, a.pilote||"–"];
      });
      slidesXml.push(pptxTableSlideXml(label, g[2], headers, colWidths, tableRows));
    });
  });
  if(slidesXml.length===1){
    slidesXml.push(pptxTableSlideXml("Aucune anomalie active", "8A93A8", headers, colWidths, []));
  }

  var files = [
    {name:"[Content_Types].xml", data: pptxContentTypes(slidesXml.length)},
    {name:"_rels/.rels", data: PPTX_ROOT_RELS},
    {name:"docProps/core.xml", data: pptxCore("Point de suivi des anomalies prioritaires — "+monthLabel)},
    {name:"docProps/app.xml", data: pptxApp(slidesXml.length)},
    {name:"ppt/presentation.xml", data: pptxPresentation(slidesXml.length)},
    {name:"ppt/_rels/presentation.xml.rels", data: pptxPresentationRels(slidesXml.length)},
    {name:"ppt/theme/theme1.xml", data: PPTX_THEME},
    {name:"ppt/slideMasters/slideMaster1.xml", data: PPTX_SLIDE_MASTER},
    {name:"ppt/slideMasters/_rels/slideMaster1.xml.rels", data: PPTX_SLIDE_MASTER_RELS},
    {name:"ppt/slideLayouts/slideLayout1.xml", data: PPTX_SLIDE_LAYOUT},
    {name:"ppt/slideLayouts/_rels/slideLayout1.xml.rels", data: PPTX_SLIDE_LAYOUT_RELS}
  ];
  slidesXml.forEach(function(xml, i){
    files.push({name:"ppt/slides/slide"+(i+1)+".xml", data: xml});
    files.push({name:"ppt/slides/_rels/slide"+(i+1)+".xml.rels", data: PPTX_SLIDE_RELS});
  });

  var blob = buildZip(files);
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "Point-suivi-anomalies-"+todayISO()+".pptx";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
}

      '<div class="kiosk-kpis">'+
        '<div><div class="n">'+k.total+'</div><div class="l">Anomalies identifiées</div></div>'+
        '<div><div class="n" style="color:#8FB4F5">'+correctifs+'</div><div class="l">Correctifs en cours ou réalisés</div></div>'+
        '<div><div class="n" style="color:#F0B36C">'+contournements+'</div><div class="l">Contournements disponibles</div></div>'+
        '<div><div class="n" style="color:#F0899A">'+al.overdue.length+'</div><div class="l">Échéances dépassées</div></div>'+
      "</div></div>";
  } else if(section==="indicateurs"){
    body = '<div class="kiosk-body" style="text-align:center">'+
      "<h3 "+SUB+">Indicateurs clés</h3>"+
      '<div class="kiosk-kpis">'+
        '<div><div class="n">'+k.total+'</div><div class="l">Anomalies remontées</div></div>'+
        '<div><div class="n" style="color:#F0B36C">'+k.ouverts+'</div><div class="l">Tickets incidents ouverts</div></div>'+
        '<div><div class="n" style="color:#C9A2EF">'+k.pilotes+'</div><div class="l">Pilotes engagés</div></div>'+
        '<div><div class="n" style="color:#7BDBA6">'+k.mep+'</div><div class="l">MEP réalisées</div></div>'+
        '<div><div class="n" style="color:#7BDBA6">'+k.taux+'%</div><div class="l">Taux de résolution</div></div>'+
      "</div></div>";
  } else if(section==="donut"){
    body = '<div class="kiosk-body" style="text-align:center">'+donutChartHTML(list,k)+"</div>";
  } else if(section==="trend"){
    body = '<div class="kiosk-body"><h3 '+SUB+' style="margin-bottom:14px">Tendance ('+TREND_WEEKS+' dernières semaines)</h3>'+trendChartHTML(list)+"</div>";
  }
  el.innerHTML = '<div class="kiosk">'+
    '<button class="kiosk-exit" data-a="kiosk-exit">Quitter ✕</button>'+
    '<button class="kiosk-nav kiosk-prev" data-a="kiosk-prev" aria-label="Précédent">‹</button>'+
    '<button class="kiosk-nav kiosk-next" data-a="kiosk-next" aria-label="Suivant">›</button>'+
    '<div class="kiosk-eyebrow">TGV CARE · UO Sud-Est</div>'+
    "<h2>Suivi des anomalies</h2>"+
    body+
    '<div class="kiosk-dots">'+KIOSK_SECTIONS.map(function(s,i){ return '<span class="'+(i===S.kioskIdx%KIOSK_SECTIONS.length?"on":"")+'" data-a="kiosk-goto" data-v="'+i+'"></span>'; }).join("")+"</div>"+
  "</div>";
}
function startKiosk(){
  S.kioskIdx = 0;
  S.page = "kiosk";
  if(document.documentElement.requestFullscreen){ document.documentElement.requestFullscreen()["catch"](function(){}); }
  kioskRender();
}
function stopKiosk(){
  S.page = "consult";
  if(document.fullscreenElement){ document.exitFullscreen()["catch"](function(){}); }
  render();
}
function handleAction(a, v, id){
  switch(a){
    case "nav":
      if(v==="declare") resetDeclareForm();
      if(v==="login"){ S.pinInput=""; S.pinErr=false; }
      if(v==="admin" && !S.authed) v="login";
      S.detailId = null;
      S.mobileNavOpen = false;
      S.page=v; render();
      break;
    case "toggle-mobile-nav":
      S.mobileNavOpen = !S.mobileNavOpen;
      render();
      break;
    case "sort": {
      if(S.sort.field===v){ S.sort.dir = S.sort.dir==="asc"?"desc":"asc"; }
      else { S.sort.field=v; S.sort.dir = (SORT_DATE_FIELDS.indexOf(v)!==-1) ? "desc" : "asc"; }
      refreshResults();
      break;
    }
    case "tab":
      S.adminTab=v; S.editingId=null; S.detailId=null; render();
      break;
    case "cycle-theme": {
      var themeOrder = ["auto","light","dark"];
      setTheme(themeOrder[(themeOrder.indexOf(S.theme)+1)%themeOrder.length]);
      break;
    }
    case "set-view":
      S.consultView = v; refreshResults(); render();
      break;
    case "quick-filter": {
      var parts = v.split(":"); var field = parts[0], val = parts.slice(1).join(":");
      S.filters[field] = val;
      if(S.page==="admin"){ S.adminTab="liste"; render(); }
      else { S.page="consult"; render(); }
      break;
    }
    case "show-detail":
      S.detailId = (S.detailId===id) ? null : id;
      render();
      break;
    case "close-detail":
      S.detailId = null; render();
      break;
    case "kiosk-start":
      startKiosk();
      break;
    case "kiosk-exit":
      stopKiosk();
      break;
    case "kiosk-next":
      S.kioskIdx = (S.kioskIdx + 1) % KIOSK_SECTIONS.length;
      kioskRender();
      break;
    case "kiosk-prev":
      S.kioskIdx = (S.kioskIdx - 1 + KIOSK_SECTIONS.length) % KIOSK_SECTIONS.length;
      kioskRender();
      break;
    case "kiosk-goto":
      S.kioskIdx = parseInt(v,10) || 0;
      kioskRender();
      break;
    case "login":
      if(pinLockRemainingMs()>0){ render(); return; }
      if(!S.pinInput){ S.pinErr=true; render(); return; }
      verifyPinRemote(S.pinInput).then(function(ok){
        if(ok){
          pinResetFails(); S.authed=true; S.page="admin"; S.adminTab="overview"; S.pinInput=""; S.pinErr=false; localStorage.setItem("adminAuthed", "1"); render(); toast("Connecté.");
          if(localStorage.getItem("fcmAdminToken")){ setTimeout(ensureFcmMessaging, 500); }
        }
        else { pinRegisterFail(); S.pinErr=true; S.pinInput=""; render(); }
      })["catch"](function(e){ toast("Erreur de connexion : "+e.message, true); });
      break;
    case "logout":
      S.authed=false; S.page="home"; localStorage.removeItem("adminAuthed"); render();
      break;
    case "submit-declare": {
      var f = S.forms.declare;
      if(!f.site || !f.outil || !f.descriptif || !f.declarant){
        toast("Merci de compléter les champs obligatoires (site, outil, descriptif, déclarant).", true);
        return;
      }
      var obj = {
        id: uid(), dateDeclaration: f.dateDeclaration||todayISO(), site: f.site, declarant: f.declarant,
        outil: f.outil, descriptif: f.descriptif, impact: f.impact||"", ticket: f.ticket||"", jira: f.jira||"",
        severite: f.severite||"", priorite:"", correctif:"", contournement:"", echeance:"", pilote:"",
        mep:false, commentaire:f.commentaire||"", dateResolution:"", statut:"À qualifier", source:"declaration",
        notifyToken: "",
        historique: [{ts: nowISOTime(), auteur: f.declarant, texte: "Remontée initiale ("+f.site+")"}]
      };
      var finishDeclare = function(){
        S.anomalies.unshift(obj);
        saveAnomaly(obj);
        pushNotification(obj);
        trackMyTicket(obj.id);
        markMyTicketSeen(obj.id, obj.statut);
        S.lastDeclared = obj;
        S.declareDone = true;
        render();
        toast("Ticket enregistré. Merci !");
      };
      if(f.notifyMe){
        getFcmToken().then(function(token){
          obj.notifyToken = token || "";
          if(!token){ toast("Notifications non activées (permission refusée) : le ticket est enregistré normalement.", true); }
          finishDeclare();
        });
      } else {
        finishDeclare();
      }
      break;
    }
    case "copy-recap":
      navigator.clipboard.writeText(S._recapText||"").then(function(){ toast("Récapitulatif copié."); })["catch"](function(){ toast("Impossible de copier automatiquement.", true); });
      break;
    case "download-recap":
      downloadFile("anomalie-"+(S.lastDeclared?S.lastDeclared.id:"")+".json", JSON.stringify(S.lastDeclared, null, 2), "application/json");
      break;
    case "new-declare":
      resetDeclareForm(); render();
      break;
    case "toggle-signalement-aide":
      S.showSignalementAide = !S.showSignalementAide;
      render();
      break;
    case "delete-notif":
      deleteNotificationRemote(id);
      break;
    case "clear-notifs":
      clearAllNotificationsRemote();
      break;
    case "toggle-row":
      S.expanded[id] = !S.expanded[id];
      refreshResults();
      break;
    case "print-page":
      window.print();
      break;
    case "export-pptx":
      try{ generateComitologiePptx(); toast("PowerPoint généré."); }
      catch(e){ toast("Erreur lors de la génération : "+e.message, true); }
      break;
    case "edit": {
      var found = S.anomalies.filter(function(x){ return x.id===id; })[0];
      if(!found) return;
      S.forms.edit = Object.assign({}, found);
      S.editingId = id;
      S.adminTab = "liste";
      render();
      break;
    }
    case "cancel-edit":
      S.editingId=null; render();
      break;
    case "save-edit": {
      var idx = -1;
      S.anomalies.forEach(function(x,i){ if(x.id===S.editingId) idx=i; });
      if(idx>-1){
        var before = S.anomalies[idx];
        var diffs = diffSummary(before, S.forms.edit);
        var merged = Object.assign({}, before, S.forms.edit);
        if(diffs.length){
          merged.historique = (before.historique||[]).concat([{ts: nowISOTime(), auteur: S.currentAuthor||"Administration", texte: diffs.join(" · ")}]);
        }
        S.anomalies[idx] = merged;
        saveAnomaly(merged);
        toast("Modifications enregistrées.");
      }
      S.editingId=null; render();
      break;
    }
    case "delete":
      if(confirm("Supprimer définitivement cette anomalie ?")){
        S.anomalies = S.anomalies.filter(function(x){ return x.id!==id; });
        deleteAnomalyRemote(id); toast("Anomalie supprimée."); render();
      }
      break;
    case "submit-saisie": {
      var fs = S.forms.saisie;
      if(!fs.outil || !fs.descriptif){ toast("Merci de renseigner au moins l’outil et le descriptif.", true); return; }
      var obj2 = Object.assign({id:uid(), mep:false, dateResolution:"", source:"admin"}, fs);
      delete obj2._init;
      obj2.historique = [{ts: nowISOTime(), auteur: S.currentAuthor||"Administration", texte: "Créée via saisie manuelle"}];
      S.anomalies.unshift(obj2);
      saveAnomaly(obj2);
      pushNotification(obj2);
      resetSaisieForm();
      toast("Anomalie ajoutée.");
      render();
      break;
    }
    case "export-backup":
      downloadFile("sauvegarde-anomalies-tgvcare-"+todayISO()+".json", JSON.stringify({exportedAt: nowISOTime(), anomalies: S.anomalies, settings: S.settings}, null, 2), "application/json");
      toast("Sauvegarde téléchargée.");
      break;
    case "archive-now":
      archiveNow().then(function(){ toast("Archive créée."); })["catch"](function(e){ toast("Erreur : "+e.message, true); });
      break;
    case "fcm-admin-enable":
      getFcmToken().then(function(token){
        if(!token){ toast("Impossible d’activer les notifications (permission refusée ou navigateur non compatible).", true); return; }
        return db.collection("adminTokens").doc(token).set({token: token, createdAt: nowISOTime(), ua: navigator.userAgent}).then(function(){
          localStorage.setItem("fcmAdminToken", token);
          toast("Notifications activées sur cet appareil.");
          render();
        });
      })["catch"](function(e){ toast("Erreur : "+e.message, true); });
      break;
    case "fcm-admin-disable": {
      var fcmTok = localStorage.getItem("fcmAdminToken");
      if(!fcmTok){ render(); break; }
      db.collection("adminTokens").doc(fcmTok).delete().then(function(){
        localStorage.removeItem("fcmAdminToken");
        toast("Notifications désactivées sur cet appareil.");
        render();
      })["catch"](function(e){ toast("Erreur : "+e.message, true); });
      break;
    }
    case "restore-archive":
      if(confirm("Restaurer cette archive ? Les données actuelles seront remplacées pour tout le monde.")){
        restoreFromArchive(id).then(function(){ toast("Archive restaurée."); })["catch"](function(e){ toast("Erreur : "+e.message, true); });
      }
      break;
    case "clear-all": {
      var confirmWord = prompt("Cette action supprime TOUTES les anomalies partagées, pour tous les sites, sans retour possible au-delà de ta dernière sauvegarde.\n\nTape VIDER en majuscules pour confirmer :");
      if(confirmWord===null) break;
      if(confirmWord==="VIDER"){
        S.anomalies=[]; clearAllRemote(); toast("Toutes les anomalies ont été supprimées."); render();
      } else {
        toast("Confirmation invalide : rien n’a été supprimé.", true);
      }
      break;
    }
    case "add-outil": {
      var no = (S.forms.settings.newOutil||"").trim();
      if(no && S.settings.outils.indexOf(no)===-1){ S.settings.outils.push(no); S.settings.outils.sort(); }
      S.forms.settings.newOutil=""; saveSettings(); render();
      break;
    }
    case "remove-outil":
      S.settings.outils = S.settings.outils.filter(function(o){ return o!==id; });
      saveSettings(); render();
      break;
    case "add-statut": {
      var ns = (S.forms.settings.newStatut||"").trim();
      if(ns && S.settings.statuts.indexOf(ns)===-1){ S.settings.statuts.push(ns); }
      S.forms.settings.newStatut=""; saveSettings(); render();
      break;
    }
    case "remove-statut":
      S.settings.statuts = S.settings.statuts.filter(function(o){ return o!==id; });
      saveSettings(); render();
      break;
    case "change-pin": {
      var curP = S.forms.settings.currentPin, np = S.forms.settings.newPin, np2 = S.forms.settings.newPin2;
      if(!curP){ toast("Merci de saisir le code actuel.", true); return; }
      if(!np || np.length<4){ toast("Le code doit contenir au moins 4 caractères.", true); return; }
      if(np!==np2){ toast("Les deux codes ne correspondent pas.", true); return; }
      changePinRemote(curP, np).then(function(ok){
        if(ok){
          localStorage.setItem("adminAuthed", "1");
          S.forms.settings.currentPin=""; S.forms.settings.newPin=""; S.forms.settings.newPin2="";
          toast("Code administrateur mis à jour.");
          render();
        }
      })["catch"](function(e){ toast("Erreur : "+(e.message||"code actuel incorrect"), true); });
      break;
    }
    default: break;
  }
}

/* ============================= ÉCOUTEURS D'ÉVÉNEMENTS ============================= */
(function(){
  var app = document.getElementById("app");
  app.addEventListener("click", function(e){
    var t = e.target.closest("[data-a]");
    if(!t) return;
    handleAction(t.dataset.a, t.dataset.v, t.dataset.id);
  });
  app.addEventListener("input", function(e){
    var t = e.target;
    if(t.id==="pin-input"){ S.pinInput = t.value; return; }
    if(!t.dataset || !t.dataset.f) return;
    var textLike = t.tagName==="TEXTAREA" || (t.tagName==="INPUT" && ["text","search","number","password"].indexOf(t.type)!==-1);
    if(!textLike) return;
    setDeep(t.dataset.f, t.value);
    if(t.dataset.refresh) refreshResults();
  });
  app.addEventListener("change", function(e){
    var t = e.target;
    if(!t.dataset || !t.dataset.f) return;
    var val = t.type==="checkbox" ? t.checked : t.value;
    setDeep(t.dataset.f, val);
    if(t.dataset.f==="currentAuthor"){ save(); return; }
    if(t.dataset.refresh){ refreshResults(); } else { render(); }
  });
  app.addEventListener("keydown", function(e){
    if(e.key==="Enter" && e.target && e.target.id==="pin-input"){ handleAction("login"); }
  });
  app.addEventListener("dragstart", function(e){
    var card = e.target.closest && e.target.closest(".kcard[draggable=true]");
    if(!card) return;
    dragState.id = card.dataset.id;
    card.classList.add("dragging");
    if(e.dataTransfer){ e.dataTransfer.effectAllowed = "move"; try{ e.dataTransfer.setData("text/plain", card.dataset.id); }catch(e2){} }
  });
  app.addEventListener("dragend", function(e){
    var card = e.target.closest && e.target.closest(".kcard");
    if(card) card.classList.remove("dragging");
  });
  app.addEventListener("dragover", function(e){
    var col = e.target.closest && e.target.closest(".kanban-col");
    if(!col) return;
    e.preventDefault();
    col.classList.add("dragover");
  });
  app.addEventListener("dragleave", function(e){
    var col = e.target.closest && e.target.closest(".kanban-col");
    if(col) col.classList.remove("dragover");
  });
  app.addEventListener("drop", function(e){
    var col = e.target.closest && e.target.closest(".kanban-col");
    if(!col || !dragState.id) return;
    e.preventDefault();
    col.classList.remove("dragover");
    moveAnomalyToStatut(dragState.id, col.dataset.col);
    dragState.id = null;
  });
  document.addEventListener("keydown", function(e){
    if(S.page!=="kiosk") return;
    if(e.key==="Escape"){ stopKiosk(); }
    else if(e.key==="ArrowRight" || e.key===" "){ e.preventDefault(); handleAction("kiosk-next"); }
    else if(e.key==="ArrowLeft"){ handleAction("kiosk-prev"); }
  });
  document.addEventListener("fullscreenchange", function(){
    if(!document.fullscreenElement && S.page==="kiosk"){ stopKiosk(); }
  });
})();

/* ============================= INITIALISATION ============================= */
loadTheme();
load();
render();
</script>
